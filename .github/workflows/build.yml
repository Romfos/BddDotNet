name: Build
on: push

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macOS-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            10.0.x
            11.0.x

      - name: Build
        run: dotnet build ./src/BddDotNet.slnx

      - name: Test
        run: dotnet test --no-build --no-restore --solution ./src/BddDotNet.slnx --no-progress

  format-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 11.0.x

      - name: Format
        run: dotnet format --verify-no-changes ./src/BddDotNet.slnx